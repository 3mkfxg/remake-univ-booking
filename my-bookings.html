<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="حجوزاتي - نظام حجز ملاعب جامعة الإسراء">
  <title>حجوزاتي | نظام حجز الملاعب</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <div class="header-inner">
        <a href="dashboard.html" class="header-logo">
          <img src="assets/logo.png" alt="جامعة الإسراء">
          <span class="header-logo-text">جامعة الإسـراء</span>
        </a>
        <nav class="header-nav" id="mainNav">
          <div class="user-info-badge" id="headerUserBadge" style="display: none;">
            <div class="user-details">
              <span class="user-name" id="navUserName">...</span>
              <span class="user-id" id="navUserId">...</span>
            </div>
            <div class="user-icon"><i class="fas fa-user"></i></div>
          </div>
          <a href="dashboard.html">الرئيسية</a>
          <a href="my-bookings.html" class="active">حجوزاتي</a>
          <a href="#" class="nav-logout" id="logoutBtn">تسجيل الخروج</a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <div class="container">
        <h1 class="text-brand mb-6"><i class="fas fa-calendar-check"></i> قائمة الحجوزات</h1>

        <div class="booking-tabs" id="mainTabs">
          <div class="booking-tab active" data-tab="active">نشطة <span class="badge-count" id="count-active">0</span></div>
          <div class="booking-tab" data-tab="invited">دعوات <span class="badge-count" id="count-invited">0</span></div>
          <div class="booking-tab" data-tab="expired">منتهية <span class="badge-count" id="count-expired">0</span></div>
          <div class="booking-tab" data-tab="public">عامة <span class="badge-count" id="count-public">0</span></div>
        </div>

        <div id="tab-active" class="tab-content active"><div id="list-active" class="bookings-list"></div></div>
        <div id="tab-invited" class="tab-content"><div id="list-invited" class="bookings-list"></div></div>
        <div id="tab-expired" class="tab-content"><div id="list-expired" class="bookings-list"></div></div>
        <div id="tab-public" class="tab-content">
          <h2 class="mb-4" style="font-size: var(--font-size-lg);">حجوزات بانتظار لاعبين</h2>
          <div id="list-public" class="grid grid-2 gap-6"></div>
        </div>
      </div>
    </main>
  </div>

  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/booking.js"></script>
  <script>
    let currentUser = null, allBookings = [];

    document.addEventListener('DOMContentLoaded', () => {
      AuthManager.onAuthStateChanged(user => {
        if (!user) { window.location.href='index.html'; return; }
        currentUser = user;
        document.getElementById('headerUserBadge').style.display = 'flex';
        document.getElementById('navUserName').textContent = user.name;
        document.getElementById('navUserId').textContent = user.uid;
        loadData();
      });
      document.querySelectorAll('.booking-tab').forEach(t => t.onclick = () => switchTab(t.dataset.tab));
      const t = Utils.getParam('tab'); if(t) setTimeout(() => switchTab(t), 100);
    });

    async function loadData() {
      try {
        allBookings = await BookingEngine.getUserBookings(currentUser.uid);
        const publicList = await BookingEngine.getPublicBookings();
        render(publicList);
      } catch(e) { console.error(e); }
    }

    function render(publicList) {
      const active = [], invited = [], expired = [], now = new Date();
      allBookings.forEach(b => {
        const isExp = new Date(`${b.date}T${b.endTime}`) < now;
        const me = b.players.find(p => p.id.toLowerCase() === currentUser.uid.toLowerCase());
        if (isExp) expired.push(b);
        else if (me && !me.confirmed) invited.push(b);
        else active.push(b);
      });

      document.getElementById('count-active').textContent = active.length;
      document.getElementById('count-invited').textContent = invited.length;
      document.getElementById('count-expired').textContent = expired.length;
      document.getElementById('count-public').textContent = publicList.length;

      renderGroup('list-active', active, false, false);
      renderGroup('list-invited', invited, true, false);
      renderGroup('list-expired', expired, false, true);
      renderPublic(publicList);
    }

    function renderGroup(id, list, isInv, isExp) {
      const e = document.getElementById(id);
      if(!list.length) { e.innerHTML = '<div class="empty-state">لا يوجد</div>'; return; }
      e.innerHTML = list.map(b => `
        <div class="booking-card ${isExp?'expired':''}">
          <div class="booking-icon"><i class="fas ${getIcon(b.sportType)}"></i></div>
          <div class="booking-info">
            <h3 class="booking-title">${b.fieldName}</h3>
            <div class="booking-meta"><span>${Utils.formatDate(b.date)}</span> | <span>${Utils.formatTime(b.startTime)}</span></div>
            <div class="booking-id-tag">ID: ${b.bookingId}</div>
          </div>
          <div class="booking-actions">
            ${isInv? `<a href="player-confirm.html?booking=${b.bookingId}&player=${currentUser.uid}&token=${encodeURIComponent(b.token)}" class="btn btn-primary btn-sm">تأكيد</a>` : `<a href="confirmation.html?id=${b.bookingId}" class="btn btn-secondary btn-sm">عرض</a>`}
          </div>
        </div>
      `).join('');
    }

    function renderPublic(list) {
      const e = document.getElementById('list-public');
      const av = list.filter(b => !b.players.some(p => p.id.toLowerCase() === currentUser.uid.toLowerCase()));
      if(!av.length) { e.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">لا توجد حجوزات عامة</div>'; return; }
      e.innerHTML = av.map(b => `
        <div class="public-card">
          <div class="public-header"><span>${b.fieldName}</span> <span class="badge badge-info">${b.maxPlayers - b.players.length} شاغر</span></div>
          <div class="public-body">
            <div class="mb-3"><span>${Utils.formatDate(b.date)}</span> @ <span>${Utils.formatTime(b.startTime)}</span></div>
            <button class="btn btn-primary btn-block" onclick="joinMatch('${b.bookingId}')">انضم الآن</button>
          </div>
        </div>
      `).join('');
    }

    async function joinMatch(id) {
      document.getElementById('loadingOverlay').classList.add('active');
      try {
        await BookingEngine.joinPublicBooking(id, currentUser.uid, currentUser.name);
        Utils.showToast('تم الانضمام بنجاح!', 'success');
        loadData();
      } catch(e) { Utils.showToast(e.message, 'error'); }
      finally { document.getElementById('loadingOverlay').classList.remove('active'); }
    }

    function getIcon(s) { const m = { padel:'fa-table-tennis-paddle-ball', football:'fa-futbol', squash:'fa-table-tennis-paddle-ball', multi:'fa-basketball', beach:'fa-umbrella-beach' }; return m[s] || 'fa-star'; }
    function switchTab(id) {
      document.querySelectorAll('.booking-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-'+id));
    }
  </script>
</body>
</html>
