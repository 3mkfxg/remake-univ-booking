<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="إدارة حجوزاتك - نظام حجز ملاعب جامعة الإسراء">
  <title>حجوزاتي | نظام حجز الملاعب</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="icon" type="image/png" href="assets/logo.png">

  <style>
    .booking-tabs {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
      border-bottom: 2px solid var(--color-border-light);
      padding-bottom: var(--space-2);
      overflow-x: auto;
      white-space: nowrap;
    }
    .booking-tab {
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 600;
      color: var(--color-text-muted);
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .booking-tab:hover {
      background: var(--color-bg-page-light);
    }
    .booking-tab.active {
      background: var(--color-text-brand);
      color: white;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .badge-count {
      background: rgba(255,255,255,0.2);
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 10px;
      margin-right: 5px;
    }
    .booking-tab:not(.active) .badge-count {
      background: var(--color-bg-page-light);
      color: var(--color-text-brand);
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <div class="header-inner">
        <a href="dashboard.html" class="header-logo">
          <img src="assets/logo.png" alt="جامعة الإسراء">
          <span class="header-logo-text">جامعة الإسـراء</span>
        </a>
        <nav class="header-nav">
          <a href="dashboard.html">الرئيسية</a>
          <a href="dashboard.html">الملاعب</a>
          <a href="my-bookings.html" class="active">حجوزاتي</a>
          <a href="#" onclick="AuthManager.logout(); window.location.href='index.html';" class="nav-logout">
            تسجيل الخروج <i class="fas fa-sign-out-alt"></i>
          </a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <div class="container">
        <h1 class="section-title">إدارة حجوزاتك</h1>

        <!-- Sub Tabs -->
        <div class="booking-tabs" id="tabsList">
          <div class="booking-tab active" onclick="switchTab('active')">
            نشطة <span class="badge-count" id="count-active">0</span>
          </div>
          <div class="booking-tab" onclick="switchTab('invited')">
            دعوات بانتظارك <span class="badge-count" id="count-invited">0</span>
          </div>
          <div class="booking-tab" onclick="switchTab('expired')">
            منتهية <span class="badge-count" id="count-expired">0</span>
          </div>
          <div class="booking-tab" onclick="switchTab('public')">
            البحث عن حجز عام
          </div>
        </div>

        <!-- Active Tab Content -->
        <div id="active-tab" class="tab-content active">
          <div id="activeBookings" class="bookings-list">
            <div class="text-center p-8"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Invited Tab Content -->
        <div id="invited-tab" class="tab-content">
          <div id="invitedBookings" class="bookings-list">
            <div class="text-center p-8"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Expired Tab Content -->
        <div id="expired-tab" class="tab-content">
          <div id="expiredBookings" class="bookings-list">
            <div class="text-center p-8"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Public Tab (Coming Soon) -->
        <div id="public-tab" class="tab-content">
          <div class="empty-state">
            <div class="empty-icon"><i class="fas fa-search-plus"></i></div>
            <h3>البحث عن حجز عام</h3>
            <p>قريباً! ستتمكن من الانضمام إلى حجوزات عامة يفتحها لاعبون آخرون.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/booking.js"></script>
  <script>
    let currentUser = null;

    document.addEventListener('DOMContentLoaded', async () => {
      currentUser = AuthManager.getCurrentUser();
      if (!currentUser) { window.location.href = 'index.html'; return; }
      loadAllBookings();
    });

    async function loadAllBookings() {
      try {
        const bookings = await BookingEngine.getUserBookings(currentUser.uid);
        renderBookings(bookings);
      } catch (error) {
        console.error(error);
        const err = '<div class="alert alert-danger">فشل تحميل الحجوزات</div>';
        document.getElementById('activeBookings').innerHTML = err;
        document.getElementById('expiredBookings').innerHTML = err;
        document.getElementById('invitedBookings').innerHTML = err;
      }
    }

    function renderBookings(bookings) {
      const now = new Date();
      
      const active = [];
      const expired = [];
      const invited = [];

      bookings.forEach(b => {
        // Parse booking end time
        const endDateTime = new Date(`${b.date}T${b.endTime}`);
        const isExpired = endDateTime < now;
        
        const playerEntry = b.players.find(p => p.id.toLowerCase() === currentUser.uid.toLowerCase());
        const isPendingInvite = playerEntry && !playerEntry.confirmed;

        if (isExpired) {
          expired.push(b);
        } else if (isPendingInvite) {
          invited.push(b);
        } else {
          active.push(b);
        }
      });

      // Update counts
      document.getElementById('count-active').textContent = active.length;
      document.getElementById('count-invited').textContent = invited.length;
      document.getElementById('count-expired').textContent = expired.length;

      // Render Active
      const activeGrid = document.getElementById('activeBookings');
      activeGrid.innerHTML = active.length ? active.map(b => renderBookingCard(b, false)).join('') : renderEmpty('لا توجد حجوزات نشطة حالياً');

      // Render Invited
      const invitedGrid = document.getElementById('invitedBookings');
      invitedGrid.innerHTML = invited.length ? invited.map(b => renderBookingCard(b, true)).join('') : renderEmpty('لا توجد دعوات بانتظار التأكيد');

      // Render Expired
      const expiredGrid = document.getElementById('expiredBookings');
      expiredGrid.innerHTML = expired.length ? expired.map(b => renderBookingCard(b, false, true)).join('') : renderEmpty('لا توجد حجوزات منتهية');
    }

    function renderBookingCard(b, isPending, isExpired = false) {
      const statusClass = isExpired ? 'status-expired' : (isPending ? 'status-pending' : 'status-confirmed');
      const statusLabel = isExpired ? 'منتهي' : (isPending ? 'بانتظار التأكيد' : 'مؤكد');
      
      return `
        <div class="booking-card ${isExpired ? 'expired' : ''}">
          <div class="booking-icon"><i class="fas ${getSportIcon(b.sportType)}"></i></div>
          <div class="booking-info">
            <h3 class="booking-title">${b.fieldName}</h3>
            <div class="booking-meta">
              <span><i class="far fa-calendar-alt"></i> ${Utils.formatDate(b.date)}</span>
              <span><i class="far fa-clock"></i> ${Utils.formatTime(b.startTime)}</span>
              <span class="booking-status ${statusClass}">${statusLabel}</span>
            </div>
            <div class="booking-id-tag">رقم الحجز: ${b.bookingId}</div>
          </div>
          <div class="booking-actions">
            ${isPending ? `
              <a href="player-confirm.html?booking=${b.bookingId}&player=${currentUser.uid}&token=${encodeURIComponent(b.token)}" class="btn btn-primary btn-sm">
                تأكيد الآن <i class="fas fa-check"></i>
              </a>
            ` : `
              <a href="confirmation.html?id=${b.bookingId}" class="btn btn-secondary btn-sm">
                التفاصيل <i class="fas fa-info-circle"></i>
              </a>
            `}
          </div>
        </div>
      `;
    }

    function renderEmpty(msg) {
      return `
        <div class="empty-state">
          <div class="empty-icon"><i class="fas fa-history"></i></div>
          <p>${msg}</p>
        </div>
      `;
    }

    function getSportIcon(sport) {
      const icons = { padel: 'fa-table-tennis-paddle-ball', football: 'fa-futbol', squash: 'fa-table-tennis-paddle-ball', multi: 'fa-basketball', beach: 'fa-umbrella-beach' };
      return icons[sport] || 'fa-star';
    }

    function switchTab(tabId) {
      document.querySelectorAll('.booking-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      // Find the clicked tab element by matching the text or using an index
      const tabs = document.querySelectorAll('.booking-tab');
      if (tabId === 'active') tabs[0].classList.add('active');
      if (tabId === 'invited') tabs[1].classList.add('active');
      if (tabId === 'expired') tabs[2].classList.add('active');
      if (tabId === 'public') tabs[3].classList.add('active');

      document.getElementById(tabId + '-tab').classList.add('active');
    }
  </script>
</body>
</html>
