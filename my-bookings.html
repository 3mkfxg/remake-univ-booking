<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="إدارة حجوزاتك - نظام حجز ملاعب جامعة الإسراء">
  <title>حجوزاتي | نظام حجز الملاعب</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="icon" type="image/png" href="assets/logo.png">

  <style>
    .booking-tabs {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
      border-bottom: 2px solid var(--color-border-light);
      padding-bottom: var(--space-2);
      overflow-x: auto;
      white-space: nowrap;
    }
    .booking-tab {
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 600;
      color: var(--color-text-muted);
      transition: all 0.2s;
      border: 1px solid transparent;
      display: flex;
      align-items: center;
    }
    .booking-tab:hover { background: var(--color-bg-page-light); }
    .booking-tab.active { background: var(--color-text-brand); color: white; }
    
    /* Nested Tabs Style */
    .nested-tabs {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
      background: var(--color-bg-page-light);
      padding: var(--space-2);
      border-radius: var(--radius-lg);
      width: fit-content;
    }
    .nested-tab {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-text-muted);
      transition: all 0.2s;
    }
    .nested-tab.active { background: white; color: var(--color-text-brand); box-shadow: var(--shadow-sm); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .badge-count {
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      margin-right: 8px;
    }
    .booking-tab:not(.active) .badge-count {
      background: #eee;
      color: var(--color-text-brand);
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <div class="header-inner">
        <a href="dashboard.html" class="header-logo">
          <img src="assets/logo.png" alt="جامعة الإسراء">
          <span class="header-logo-text">جامعة الإسـراء</span>
        </a>
        <nav class="header-nav">
          <a href="dashboard.html">الرئيسية</a>
          <a href="dashboard.html">الملاعب</a>
          <a href="my-bookings.html" class="active">حجوزاتي</a>
          <a href="#" onclick="AuthManager.logout(); window.location.href='index.html';" class="nav-logout">
            تسجيل الخروج <i class="fas fa-sign-out-alt"></i>
          </a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <div class="container">
        <h1 class="section-title">إدارة حجوزاتك</h1>

        <!-- Main Tabs -->
        <div class="booking-tabs" id="mainTabsList">
          <div class="booking-tab active" onclick="switchMainTab('active')">
            نشطة <span class="badge-count" id="count-active-total">0</span>
          </div>
          <div class="booking-tab" onclick="switchMainTab('invited')">
            دعوات بانتظارك <span class="badge-count" id="count-invited">0</span>
          </div>
          <div class="booking-tab" onclick="switchMainTab('expired')">
            منتهية <span class="badge-count" id="count-expired">0</span>
          </div>
          <div class="booking-tab" onclick="switchMainTab('public')">
            البحث عن حجز عام
          </div>
        </div>

        <!-- ACTIVE TAB: Nested Tabs nested here -->
        <div id="active-tab" class="tab-content active">
          <div class="nested-tabs">
            <div class="nested-tab active" id="nested-btn-confirmed" onclick="switchNestedTab('confirmed')">
              مؤكد <span id="count-active-confirmed" style="margin-right:5px;">(0)</span>
            </div>
            <div class="nested-tab" id="nested-btn-pending" onclick="switchNestedTab('pending')">
              بانتظار التأكيد <span id="count-active-pending" style="margin-right:5px;">(0)</span>
            </div>
          </div>

          <div id="active-confirmed-content" class="active-sub-content">
            <div id="list-active-confirmed" class="bookings-list"></div>
          </div>
          <div id="active-pending-content" class="active-sub-content" style="display:none;">
            <div id="list-active-pending" class="bookings-list"></div>
          </div>
        </div>

        <!-- INVITED TAB -->
        <div id="invited-tab" class="tab-content">
          <div id="list-invited" class="bookings-list"></div>
        </div>

        <!-- EXPIRED TAB -->
        <div id="expired-tab" class="tab-content">
          <div id="list-expired" class="bookings-list"></div>
        </div>

        <!-- PUBLIC TAB -->
        <div id="public-tab" class="tab-content">
          <div class="empty-state">
            <div class="empty-icon"><i class="fas fa-search-plus"></i></div>
            <h3>البحث عن حجز عام</h3>
            <p>قريباً! ستتمكن من الانضمام إلى حجوزات عامة يفتحها لاعبون آخرون.</p>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/booking.js"></script>
  <script>
    let currentUser = null;
    let allBookingsData = [];

    document.addEventListener('DOMContentLoaded', async () => {
      currentUser = AuthManager.getCurrentUser();
      if (!currentUser) { window.location.href = 'index.html'; return; }
      loadAll();
    });

    async function loadAll() {
      try {
        allBookingsData = await BookingEngine.getUserBookings(currentUser.uid);
        organizeAndRender();
      } catch (e) {
        console.error(e);
      }
    }

    function organizeAndRender() {
      const now = new Date();
      
      const activeConfirmed = [];
      const activePending = [];
      const invited = [];
      const expired = [];

      allBookingsData.forEach(b => {
        const endDateTime = new Date(`${b.date}T${b.endTime}`);
        const isExpired = endDateTime < now;
        const playerEntry = b.players.find(p => p.id.toLowerCase() === currentUser.uid.toLowerCase());
        const isPendingInvite = playerEntry && !playerEntry.confirmed;

        if (isExpired) {
          expired.push(b);
        } else if (isPendingInvite) {
          invited.push(b);
        } else {
          // It's active. Now split by full confirmation
          if (b.status === 'active') {
            activeConfirmed.push(b);
          } else {
            activePending.push(b);
          }
        }
      });

      // Update Counts
      document.getElementById('count-active-total').textContent = activeConfirmed.length + activePending.length;
      document.getElementById('count-active-confirmed').textContent = `(${activeConfirmed.length})`;
      document.getElementById('count-active-pending').textContent = `(${activePending.length})`;
      document.getElementById('count-invited').textContent = invited.length;
      document.getElementById('count-expired').textContent = expired.length;

      // Render Lists
      renderList('list-active-confirmed', activeConfirmed, false, false);
      renderList('list-active-pending', activePending, false, false);
      renderList('list-invited', invited, true, false);
      renderList('list-expired', expired, false, true);
    }

    function renderList(elemId, list, isPendingAction, isExpired) {
      const elem = document.getElementById(elemId);
      if (!list.length) {
        elem.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i class="fas fa-calendar-alt"></i></div>
            <p>لا توجد حجوزات في هذا القسم</p>
          </div>
        `;
        return;
      }

      elem.innerHTML = list.map(b => `
        <div class="booking-card ${isExpired ? 'expired' : ''}">
          <div class="booking-icon"><i class="fas ${getIcon(b.sportType)}"></i></div>
          <div class="booking-info">
            <h3 class="booking-title">${b.fieldName}</h3>
            <div class="booking-meta">
              <span><i class="far fa-calendar-alt"></i> ${Utils.formatDate(b.date)}</span>
              <span><i class="far fa-clock"></i> ${Utils.formatTime(b.startTime)}</span>
              <span class="booking-status ${isExpired ? 'status-expired' : (b.status === 'active' ? 'status-confirmed' : 'status-pending')}">
                ${isExpired ? 'منتهي' : (b.status === 'active' ? 'مؤكد' : 'بانتظار التأكيد')}
              </span>
            </div>
            <div class="booking-id-tag">ID: ${b.bookingId}</div>
          </div>
          <div class="booking-actions">
            ${isPendingAction ? `
              <a href="player-confirm.html?booking=${b.bookingId}&player=${currentUser.uid}&token=${encodeURIComponent(b.token)}" class="btn btn-primary btn-sm">تأكيد الآن</a>
            ` : `
              <a href="confirmation.html?id=${b.bookingId}" class="btn btn-secondary btn-sm">التفاصيل</a>
            `}
          </div>
        </div>
      `).join('');
    }

    function getIcon(s) {
      const m = { padel: 'fa-table-tennis-paddle-ball', football: 'fa-futbol', squash: 'fa-table-tennis-paddle-ball', multi: 'fa-basketball', beach: 'fa-umbrella-beach' };
      return m[s] || 'fa-star';
    }

    function switchMainTab(id) {
      document.querySelectorAll('#mainTabsList .booking-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      const tabIdx = { active: 0, invited: 1, expired: 2, public: 3 }[id];
      document.querySelectorAll('#mainTabsList .booking-tab')[tabIdx].classList.add('active');
      document.getElementById(id + '-tab').classList.add('active');
    }

    function switchNestedTab(id) {
      document.querySelectorAll('.nested-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.active-sub-content').forEach(c => c.style.display = 'none');
      
      document.getElementById('nested-btn-' + id).classList.add('active');
      document.getElementById('active-' + id + '-content').style.display = 'block';
    }
  </script>
</body>
</html>
