<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="حجوزاتي - نظام حجز ملاعب جامعة الإسراء">
  <title>حجوزاتي | نظام حجز الملاعب</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <div class="header-inner">
        <a href="dashboard.html" class="header-logo">
          <img src="assets/logo.png" alt="جامعة الإسراء">
          <span class="header-logo-text">جامعة الإسـراء</span>
        </a>
        <nav class="header-nav" id="mainNav">
          <div class="user-info-badge" id="headerUserBadge" style="display: none;">
            <div class="user-details">
              <span class="user-name" id="navUserName">...</span>
              <span class="user-id" id="navUserId">...</span>
            </div>
            <div class="user-icon"><i class="fas fa-user"></i></div>
          </div>
          <a href="dashboard.html">الرئيسية</a>
          <a href="my-bookings.html" class="active">حجوزاتي</a>
          <a href="#" class="nav-logout" id="logoutBtn">تسجيل الخروج</a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <div class="container">
        <h1 class="text-brand mb-6"><i class="fas fa-list-ul"></i> إدارة الحجوزات</h1>

        <div class="booking-tabs" id="mainTabsList">
          <div class="booking-tab active" onclick="switchMainTab('active')">نشطة <span class="badge-count" id="count-active-total">0</span></div>
          <div class="booking-tab" onclick="switchMainTab('invited')">دعوات <span class="badge-count" id="count-invited">0</span></div>
          <div class="booking-tab" onclick="switchMainTab('expired')">منتهية <span class="badge-count" id="count-expired">0</span></div>
          <div class="booking-tab" onclick="switchMainTab('public')">حجوزات عامة <span class="badge-count" id="count-public">0</span></div>
        </div>

        <div id="active-tab" class="tab-content active">
          <div class="nested-tabs">
            <div class="nested-tab active" id="nested-btn-confirmed" onclick="switchNestedTab('confirmed')">مؤكد <span id="count-active-confirmed"></span></div>
            <div class="nested-tab" id="nested-btn-pending" onclick="switchNestedTab('pending')">بانتظار التأكيد <span id="count-active-pending"></span></div>
          </div>
          <div id="active-confirmed-content"><div id="list-active-confirmed" class="bookings-list"></div></div>
          <div id="active-pending-content" style="display:none;"><div id="list-active-pending" class="bookings-list"></div></div>
        </div>

        <div id="invited-tab" class="tab-content"><div id="list-invited" class="bookings-list"></div></div>
        <div id="expired-tab" class="tab-content"><div id="list-expired" class="bookings-list"></div></div>

        <div id="public-tab" class="tab-content">
          <div class="flex-between mb-4">
            <h2 style="font-size: var(--font-size-lg);">اكتشف حجوزات مفتوحة</h2>
            <p class="text-muted" style="font-size: var(--font-size-sm);">انضم إلى فرق أخرى وأكمل العدد!</p>
          </div>
          <div id="list-public" class="grid grid-2 gap-6"></div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="publicDetailsModal">
    <div class="modal">
      <div class="modal-header"><h3>تفاصيل الحجز العام</h3></div>
      <div class="modal-body" id="publicDetailsBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('publicDetailsModal')">إغلاق</button>
        <button class="btn btn-primary" id="joinPublicBtn">انضمام للفريق</button>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/booking.js"></script>
  <script>
    let currentUser = null, allBookingsData = [];

    document.addEventListener('DOMContentLoaded', async () => {
      AuthManager.onAuthStateChanged(user => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        document.getElementById('headerUserBadge').style.display = 'flex';
        document.getElementById('navUserName').textContent = user.name;
        document.getElementById('navUserId').textContent = user.uid;
        loadAll();
      });
      if (Utils.getParam('tab')) switchMainTab(Utils.getParam('tab'));
    });

    async function loadAll() {
      try {
        allBookingsData = await BookingEngine.getUserBookings(currentUser.uid);
        const publicList = await BookingEngine.getPublicBookings();
        renderMain(publicList);
      } catch (e) { console.error(e); }
    }

    function renderMain(publicList) {
      const activeC = [], activeP = [], invited = [], expired = [];
      const now = new Date();
      allBookingsData.forEach(b => {
        const isExp = new Date(`${b.date}T${b.endTime}`) < now;
        const pEntry = b.players.find(p => p.id.toLowerCase() === currentUser.uid.toLowerCase());
        const isInv = pEntry && !pEntry.confirmed;
        if (isExp) expired.push(b);
        else if (isInv) invited.push(b);
        else b.status === 'active' ? activeC.push(b) : activeP.push(b);
      });

      document.getElementById('count-active-total').textContent = activeC.length + activeP.length;
      document.getElementById('count-active-confirmed').textContent = `(${activeC.length})`;
      document.getElementById('count-active-pending').textContent = `(${activeP.length})`;
      document.getElementById('count-invited').textContent = invited.length;
      document.getElementById('count-expired').textContent = expired.length;
      document.getElementById('count-public').textContent = publicList.length;

      renderList('list-active-confirmed', activeC, false, false);
      renderList('list-active-pending', activeP, false, false);
      renderList('list-invited', invited, true, false);
      renderList('list-expired', expired, false, true);
      renderPublic(publicList);
    }

    function renderList(id, list, isInv, isExp) {
      const e = document.getElementById(id);
      if (!list.length) { e.innerHTML = '<div class="empty-state">لا توجد حجوزات</div>'; return; }
      e.innerHTML = list.map(b => `
        <div class="booking-card ${isExp?'expired':''}">
          <div class="booking-icon"><i class="fas ${getIcon(b.sportType)}"></i></div>
          <div class="booking-info">
            <h3 class="booking-title">${b.fieldName}</h3>
            <div class="booking-meta"><span>${Utils.formatDate(b.date)}</span> | <span>${Utils.formatTime(b.startTime)}</span></div>
            <div class="booking-id-tag">ID: ${b.bookingId}</div>
          </div>
          <div class="booking-actions">
            ${isInv? `<a href="player-confirm.html?booking=${b.bookingId}&player=${currentUser.uid}&token=${encodeURIComponent(b.token)}" class="btn btn-primary btn-sm">تأكيد الحضور</a>` : `<a href="confirmation.html?id=${b.bookingId}" class="btn btn-secondary btn-sm">عرض</a>`}
          </div>
        </div>
      `).join('');
    }

    function renderPublic(list) {
      const e = document.getElementById('list-public');
      const av = list.filter(b => !b.players.some(p => p.id.toLowerCase() === currentUser.uid.toLowerCase()));
      if (!av.length) { e.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">لا توجد حجوزات عامة حالياً</div>'; return; }
      e.innerHTML = av.map(b => `
        <div class="public-card">
          <div class="public-header"><span>${b.fieldName}</span> <span class="badge badge-info">${b.maxPlayers - b.players.length} شاغر</span></div>
          <div class="public-body">
            <div class="mb-3"><span>${Utils.formatDate(b.date)}</span> @ <span>${Utils.formatTime(b.startTime)}</span></div>
            <button class="btn btn-primary btn-block" onclick='viewPublicInfo(${JSON.stringify(b).replace(/'/g, "&apos;")})'>عرض التفاصيل والانضمام</button>
          </div>
        </div>
      `).join('');
    }

    function viewPublicInfo(b) {
      const body = document.getElementById('publicDetailsBody');
      body.innerHTML = `
        <div class="p-2">
          <h4>${b.fieldName}</h4>
          <p>التاريخ: ${Utils.formatDate(b.date)}</p>
          <p>الوقت: ${Utils.formatTime(b.startTime)}</p>
          <p class="mt-4 font-bold">اللاعبون الحاليون:</p>
          <ul>${b.players.map(p => `<li>${p.name} ${p.confirmed?'(مؤكد)':'(انتظار)'}</li>`).join('')}</ul>
          <p class="mt-2 text-muted">باقي ${b.maxPlayers - b.players.length} أماكن شاغرة.</p>
        </div>
      `;
      document.getElementById('joinPublicBtn').onclick = () => doJoin(b.bookingId);
      document.getElementById('publicDetailsModal').classList.add('active');
    }

    async function doJoin(id) {
      closeModal('publicDetailsModal');
      Utils.showLoading('جاري الانضمام...');
      try {
        await BookingEngine.joinPublicBooking(id, currentUser.uid, currentUser.name);
        Utils.hideLoading();
        Utils.showToast('تمت إضافتك للحجز! يرجى تأكيد حضورك الآن من تبويب "دعوات"', 'info');
        loadAll();
        setTimeout(() => switchMainTab('invited'), 1500);
      } catch(e) { Utils.hideLoading(); Utils.showToast(e.message, 'error'); }
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function getIcon(s) { const m = { padel:'fa-futbol', football:'fa-futbol', squash:'fa-table-tennis-paddle-ball', multi:'fa-basketball', beach:'fa-umbrella-beach' }; return m[s] || 'fa-star'; }
    function switchMainTab(id) {
      document.querySelectorAll('.booking-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`[onclick="switchMainTab('${id}')"]`).classList.add('active');
      document.getElementById(`${id}-tab`).classList.add('active');
    }
    function switchNestedTab(t) {
      document.querySelectorAll('.nested-tab').forEach(el => el.classList.remove('active'));
      document.getElementById(`nested-btn-${t}`).classList.add('active');
      document.getElementById('active-confirmed-content').style.display = t === 'confirmed' ? 'block' : 'none';
      document.getElementById('active-pending-content').style.display = t === 'pending' ? 'block' : 'none';
    }
  </script>
</body>
</html>
