<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إلغاء الحجز | نظام حجز الملاعب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="header-logo">
          <img src="assets/logo.png" alt="جامعة الإسراء">
          <span class="header-logo-text">جامعة الإسـراء</span>
        </a>
      </div>
    </header>

    <main class="page-content">
      <div class="cancel-container">
        <!-- Loading -->
        <div id="loadingState" class="text-center">
          <div class="spinner" style="margin: var(--space-8) auto;"></div>
          <p>جاري التحقق...</p>
        </div>

        <!-- Cancel Confirmation -->
        <div class="cancel-card hidden" id="cancelCard">
          <div class="cancel-icon" id="cancelIcon">
            <i class="fas fa-trash-alt"></i>
          </div>
          <h2 id="cancelTitle" class="mb-4">تأكيد إلغاء الحجز</h2>
          <div id="cancelDetails" class="mb-6"></div>
          <div id="cancelActions"></div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-copyright">جميع الحقوق محفوظة مركز الحاسوب © 2025</div>
      <div class="footer-social">
        <a href="https://www.instagram.com/israuniversity/" target="_blank" rel="noopener"><i class="fab fa-instagram"></i></a>
        <a href="https://twitter.com/IsraUniversity" target="_blank" rel="noopener"><i class="fab fa-twitter"></i></a>
        <a href="https://www.facebook.com/Isra.University.Jordan/" target="_blank" rel="noopener"><i class="fab fa-facebook-f"></i></a>
      </div>
    </footer>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p id="loadingText">جاري الإلغاء...</p>
  </div>
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/booking.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      showResult('error', 'إلغاء الحجز غير متاح', 'عذراً، تماشياً مع القوانين الجديدة، لا يمكن إلغاء الحجز بعد تأكيده.');
    });

    function showCancelConfirm(booking) {
      document.getElementById('loadingState').classList.add('hidden');
      const card = document.getElementById('cancelCard');
      card.classList.remove('hidden');

      document.getElementById('cancelDetails').innerHTML = `
        <div style="text-align: right; background: var(--color-bg-page-light); border-radius: var(--radius-lg); padding: var(--space-4);">
          <div class="detail-row">
            <span class="detail-label">الملعب</span>
            <span>${booking.fieldName}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">التاريخ</span>
            <span>${Utils.formatDate(booking.date)}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">الوقت</span>
            <span>${Utils.formatTime(booking.startTime)} - ${Utils.formatTime(booking.endTime)}</span>
          </div>
        </div>
        <div class="alert alert-warning mt-4">
          <i class="fas fa-exclamation-triangle"></i>
          <span>هذا الإجراء نهائي ولا يمكن التراجع عنه</span>
        </div>
      `;

      document.getElementById('cancelActions').innerHTML = `
        <button class="btn btn-danger btn-block btn-lg mb-2" id="finalCancelBtn">
          <i class="fas fa-trash-alt"></i>
          تأكيد الإلغاء نهائياً
        </button>
        <a href="dashboard.html" class="btn btn-secondary btn-block">
          <i class="fas fa-arrow-right"></i>
          تراجع
        </a>
      `;

      document.getElementById('finalCancelBtn').addEventListener('click', async () => {
        Utils.showLoading('جاري إلغاء الحجز...');
        
        const result = await BookingEngine.cancelBooking(booking.bookingId);
        
        Utils.hideLoading();
        
        if (result.success) {
          showResult('success', 'تم إلغاء الحجز بنجاح', 
            `تم إلغاء حجزك في ${booking.fieldName} بتاريخ ${Utils.formatDate(booking.date)}.`);
        } else {
          showResult('error', 'فشل الإلغاء', result.message);
        }
      });
    }

    function showResult(type, title, message) {
      document.getElementById('loadingState').classList.add('hidden');
      const card = document.getElementById('cancelCard');
      card.classList.remove('hidden');

      const iconEl = document.getElementById('cancelIcon');
      const titleEl = document.getElementById('cancelTitle');

      if (type === 'success') {
        iconEl.innerHTML = '<i class="fas fa-check-circle"></i>';
        iconEl.style.background = 'rgba(76, 175, 80, 0.1)';
        iconEl.style.color = 'var(--color-status-verified)';
        titleEl.style.color = 'var(--color-status-verified)';
      } else if (type === 'info') {
        iconEl.innerHTML = '<i class="fas fa-info-circle"></i>';
        iconEl.style.background = 'rgba(25, 118, 210, 0.1)';
        iconEl.style.color = 'var(--color-action-info)';
        titleEl.style.color = 'var(--color-action-info)';
      } else {
        iconEl.innerHTML = '<i class="fas fa-times-circle"></i>';
      }

      titleEl.textContent = title;
      document.getElementById('cancelDetails').innerHTML = `<p class="text-muted">${message}</p>`;
      document.getElementById('cancelActions').innerHTML = `
        <a href="dashboard.html" class="btn btn-primary btn-block mt-4">
          <i class="fas fa-home"></i>
          العودة للرئيسية
        </a>
      `;
    }
  </script>
</body>
</html>
