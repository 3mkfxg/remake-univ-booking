<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="حجز ملعب - نظام حجز ملاعب جامعة الإسراء">
  <title>حجز ملعب | نظام حجز الملاعب</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <div class="header-inner">
        <a href="dashboard.html" class="header-logo">
          <img src="assets/logo.png" alt="جامعة الإسراء">
          <span class="header-logo-text">جامعة الإسـراء</span>
        </a>
        <nav class="header-nav" id="mainNav">
          <div class="user-info-badge" id="headerUserBadge" style="display: none;">
            <div class="user-details">
              <span class="user-name" id="navUserName">...</span>
              <span class="user-id" id="navUserId">...</span>
            </div>
            <div class="user-icon"><i class="fas fa-user"></i></div>
          </div>
          <a href="dashboard.html">الرئيسية</a>
          <a href="dashboard.html">الملاعب</a>
          <a href="my-bookings.html">حجوزاتي</a>
          <a href="#" class="nav-logout" id="logoutBtn">
            تسجيل الخروج <i class="fas fa-sign-out-alt"></i>
          </a>
        </nav>
        <button class="menu-toggle" id="menuToggle" aria-label="القائمة">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </header>

    <main class="page-content">
      <div class="booking-layout">
        <div class="booking-calendar-section">
          <h2 class="text-brand mb-6">
            <i class="fas fa-calendar-alt"></i>
            اختر تاريخ ووقت الحجز
          </h2>
          
          <div class="calendar" id="calendarContainer">
            <div class="calendar-header">
              <h3 id="calendarMonth"></h3>
              <div class="calendar-nav">
                <button id="prevMonth"><i class="fas fa-chevron-right"></i></button>
                <button id="nextMonth"><i class="fas fa-chevron-left"></i></button>
              </div>
            </div>
            <div class="calendar-grid" id="calendarGrid">
              <div class="calendar-day-header">أحد</div>
              <div class="calendar-day-header">إثن</div>
              <div class="calendar-day-header">ثلث</div>
              <div class="calendar-day-header">أربع</div>
              <div class="calendar-day-header">خمس</div>
              <div class="calendar-day-header">جمعة</div>
              <div class="calendar-day-header">سبت</div>
            </div>
          </div>

          <div class="timeslots-section hidden" id="timeSlotsSection">
            <div class="divider"></div>
            <h3 class="mb-4"><i class="fas fa-clock"></i> اختر الوقت — <span id="selectedDateDisplay"></span></h3>
            <div class="timeslots-grid" id="timeSlotsGrid"></div>
          </div>
        </div>

        <div class="booking-sidebar">
          <div class="booking-field-info">
            <img id="fieldImage" src="assets/fields/placeholder.jpg" alt="">
            <div>
              <div class="booking-field-name" id="fieldName">—</div>
              <div class="booking-field-sport" id="fieldSport">—</div>
            </div>
          </div>

          <div class="quota-indicator mb-4">
            <div style="width: 100%;">
              <div class="flex-between mb-2">
                <span style="font-size: var(--font-size-xs); font-weight: 600;" id="quotaLabel">الحصة اليومية</span>
                <span class="quota-text" id="quotaText">0/1</span>
              </div>
              <div class="quota-bar"><div class="quota-bar-fill" id="quotaFill" style="width: 0%"></div></div>
            </div>
          </div>

          <div class="hidden" id="playerSection">
            <div class="divider"></div>
            <div class="player-entry">
              <div class="player-entry-header">
                <h3><i class="fas fa-users"></i> اللاعبون</h3>
                <span class="player-count badge badge-info" id="playerCountBadge">0/0</span>
              </div>
              <div id="playerFields"></div>
              
              <div class="mt-4 p-3 bg-light rounded" style="background: rgba(0,0,0,0.03); border-radius: var(--radius-md);">
                <label class="flex-between m-0 cursor-pointer">
                  <div style="display: flex; align-items: center; gap: var(--space-2);">
                    <i class="fas fa-globe-americas" style="color: var(--color-text-brand);"></i>
                    <span style="font-size: var(--font-size-sm); font-weight: 600;">فتح الحجز للعامة</span>
                  </div>
                  <input type="checkbox" id="publicToggle" style="width: 18px; height: 18px; accent-color: var(--color-text-brand);">
                </label>
              </div>
            </div>

            <div class="booking-summary" id="bookingSummary" style="display: none;">
              <h4 class="text-brand mb-3"><i class="fas fa-receipt"></i> ملخص الحجز</h4>
              <div class="booking-summary-row"><span>الملعب</span><span id="summaryField">—</span></div>
              <div class="booking-summary-row"><span>التاريخ</span><span id="summaryDate">—</span></div>
              <div class="booking-summary-row"><span>الوقت</span><span id="summaryTime">—</span></div>
              <div class="booking-summary-row"><span>المدة</span><span id="summaryDuration">—</span></div>
              <div class="booking-summary-row"><span id="summaryStatus">...</span></div>
            </div>

            <button class="btn btn-primary btn-block btn-lg mt-4" id="confirmBookingBtn" disabled>تأكيد الحجز</button>
          </div>

          <div class="empty-state" id="initialPrompt">
            <div class="empty-state-icon">📅</div>
            <p>اختر تاريخاً ووقتاً</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><p>جاري التحميل...</p></div>
  <div class="toast-container" id="toastContainer"></div>
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <div class="modal-header"><h2>تأكيد الحجز</h2></div>
      <div class="modal-body" id="confirmModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="confirmModalCancel">إلغاء</button>
        <button class="btn btn-primary" id="confirmModalOk">تأكيد</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/booking.js"></script>
  <script src="js/email.js"></script>
  <script>
    let currentField = null, selectedDate = null, selectedSlots = [], currentUser = null;
    let currentMonth = new Date().getMonth(), currentYear = new Date().getFullYear();

    const FIELD_IMAGES = { padel_a:'assets/fields/padel.jpg', padel_b:'assets/fields/padel.jpg', padel_c:'assets/fields/padel.jpg', padel_d:'assets/fields/padel.jpg', football_5v5:'assets/fields/football5.jpg', football_6v6:'assets/fields/football6.jpg', squash_a:'assets/fields/squash.jpg', multipurpose:'assets/fields/multi.jpg', beach:'assets/fields/beach.jpg' };

    document.addEventListener('DOMContentLoaded', () => {
      AuthManager.onAuthStateChanged(user => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        const badge = document.getElementById('headerUserBadge');
        if (badge) {
          badge.style.display = 'flex';
          document.getElementById('navUserName').textContent = user.name;
          document.getElementById('navUserId').textContent = user.uid;
        }
        init();
      });
    });

    async function init() {
      const fieldId = Utils.getParam('field');
      if (!fieldId || !BookingEngine.FIELDS[fieldId]) { window.location.href = 'dashboard.html'; return; }
      currentField = { id: fieldId, ...BookingEngine.FIELDS[fieldId] };
      document.getElementById('fieldName').textContent = currentField.name;
      document.getElementById('fieldSport').textContent = BookingEngine.getSportName(currentField.sport);
      document.getElementById('fieldImage').src = FIELD_IMAGES[fieldId] || 'assets/fields/placeholder.jpg';
      updateQuota();
      renderCalendar();
      setupEventListeners();
    }

    async function updateQuota(date) {
      if (!currentUser) return;
      const limit = AuthManager.getDailyLimit(currentUser.role);
      let used = await BookingEngine.getUsedHoursOnDate(currentUser.uid, date || Utils.today());
      const label = document.getElementById('quotaLabel'), text = document.getElementById('quotaText'), fill = document.getElementById('quotaFill');
      if (limit === Infinity) { label.textContent = 'حساب غير محدود'; text.textContent = '∞'; fill.style.width = '0%'; return; }
      text.textContent = `${used}/${limit} ساعة`;
      fill.style.width = Math.min(100, (used/limit)*100) + '%';
    }

    function renderCalendar() {
      const grid = document.getElementById('calendarGrid');
      const headers = Array.from(grid.querySelectorAll('.calendar-day-header'));
      grid.innerHTML = ''; headers.forEach(h => grid.appendChild(h));
      const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
      document.getElementById('calendarMonth').textContent = `${months[currentMonth]} ${currentYear}`;
      const first = new Date(currentYear, currentMonth, 1).getDay(), days = new Date(currentYear, currentMonth + 1, 0).getDate();
      for (let i=0; i<first; i++) { const e = document.createElement('div'); e.className = 'calendar-day empty'; grid.appendChild(e); }
      const today = new Date(); today.setHours(0,0,0,0);
      for (let d=1; d<=days; d++) {
        const ds = `${currentYear}-${(currentMonth+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
        const c = document.createElement('div'); c.className = 'calendar-day'; c.textContent = d;
        if (new Date(currentYear, currentMonth, d) < today) c.classList.add('disabled');
        else c.addEventListener('click', () => selectDate(ds, c));
        if (selectedDate === ds) c.classList.add('selected');
        grid.appendChild(c);
      }
    }

    async function selectDate(ds, c) {
      selectedDate = ds; selectedSlots = [];
      document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected'));
      c.classList.add('selected');
      document.getElementById('selectedDateDisplay').textContent = Utils.formatDate(ds);
      document.getElementById('timeSlotsSection').classList.remove('hidden');
      await updateQuota(ds);
      renderTimeSlots(ds);
    }

    async function renderTimeSlots(date) {
      const grid = document.getElementById('timeSlotsGrid');
      grid.innerHTML = '<div class="spinner spinner-sm"></div>';
      const slots = Utils.generateTimeSlots(currentField.open, currentField.close);
      const existing = await BookingEngine.getFieldBookings(currentField.id, date);
      grid.innerHTML = '';
      slots.forEach(s => {
        const booked = existing.some(ext => BookingEngine._timesOverlap(s.startTime, s.endTime, ext.startTime, ext.endTime));
        const div = document.createElement('div'); div.className = 'timeslot' + (booked ? ' booked' : ' available');
        div.textContent = s.display;
        if (!booked) div.addEventListener('click', () => {
          selectedSlots = [s];
          document.querySelectorAll('.timeslot').forEach(t => t.classList.remove('selected'));
          div.classList.add('selected');
          updateSidebar();
        });
        grid.appendChild(div);
      });
    }

    function updateSidebar() {
      const has = selectedSlots.length > 0;
      document.getElementById('playerSection').classList.toggle('hidden', !has);
      document.getElementById('initialPrompt').classList.toggle('hidden', has);
      if (has) {
        document.getElementById('bookingSummary').style.display = 'block';
        document.getElementById('summaryField').textContent = currentField.name;
        document.getElementById('summaryDate').textContent = Utils.formatDate(selectedDate);
        document.getElementById('summaryTime').textContent = selectedSlots[0].display;
        renderPlayerFields();
      }
    }

    function renderPlayerFields() {
      const container = document.getElementById('playerFields');
      container.innerHTML = '';
      for (let i=0; i<currentField.players; i++) {
        const row = document.createElement('div'); row.className = 'player-row';
        const input = document.createElement('input'); input.className = 'form-input player-id-input';
        input.placeholder = `رقم اللاعب ${i+1}`;
        if (i===0) { input.value = currentUser.uid; input.readOnly = true; }
        input.addEventListener('input', checkAllPlayersValid);
        row.appendChild(input); container.appendChild(row);
      }
      checkAllPlayersValid();
    }

    function checkAllPlayersValid() {
      const inputs = document.querySelectorAll('.player-id-input');
      const isPublic = document.getElementById('publicToggle').checked;
      let ok = true, filled = 0;
      inputs.forEach(inp => { if (inp.value.trim()) filled++; else if (!isPublic) ok = false; });
      document.getElementById('confirmBookingBtn').disabled = !ok || filled < 1;
    }

    function setupEventListeners() {
      document.getElementById('logoutBtn').onclick = () => { AuthManager.logout(); window.location.href='index.html'; };
      document.getElementById('prevMonth').onclick = () => { currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} renderCalendar(); };
      document.getElementById('nextMonth').onclick = () => { currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} renderCalendar(); };
      document.getElementById('publicToggle').onchange = checkAllPlayersValid;
      document.getElementById('confirmBookingBtn').onclick = showConfirmModal;
      document.getElementById('confirmModalCancel').onclick = () => document.getElementById('confirmModal').classList.remove('active');
      document.getElementById('confirmModalOk').onclick = submitBooking;
    }

    function showConfirmModal() {
      const b = document.getElementById('confirmModalBody');
      b.innerHTML = `<p>الملعب: ${currentField.name}</p><p>التاريخ: ${Utils.formatDate(selectedDate)}</p><p>الوقت: ${selectedSlots[0].display}</p>`;
      document.getElementById('confirmModal').classList.add('active');
    }

    async function submitBooking() {
      Utils.showLoading('جاري الحجز...');
      try {
        const players = [];
        for (const input of document.querySelectorAll('.player-id-input')) {
          const val = input.value.trim().toLowerCase();
          if (val) {
            const u = await AuthManager.getUserById(val);
            players.push({ id: val, name: u?u.name:val, email: u?u.email:`${val}@iu.edu.jo` });
          }
        }
        const b = await BookingEngine.createBooking({
          fieldId: currentField.id, date: selectedDate, startTime: selectedSlots[0].startTime, endTime: selectedSlots[0].endTime, duration: 1, bookedBy: currentUser.uid, isPublic: document.getElementById('publicToggle').checked, players
        });
        await EmailService.sendBookingConfirmation(b);
        window.location.href = `confirmation.html?id=${b.bookingId}`;
      } catch(e) { Utils.hideLoading(); Utils.showToast(e.message, 'error'); }
    }
  </script>
</body>
</html>
