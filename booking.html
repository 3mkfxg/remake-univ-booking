<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="حجز ملعب - نظام حجز ملاعب جامعة الإسراء">
  <title>حجز ملعب | نظام حجز الملاعب</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <div class="header-inner">
        <a href="dashboard.html" class="header-logo">
          <img src="assets/logo.png" alt="جامعة الإسراء">
          <span class="header-logo-text">جامعة الإسـراء</span>
        </a>
        <nav class="header-nav" id="mainNav">
          <div class="user-info-badge" id="headerUserBadge" style="display: none;">
            <div class="user-details">
              <span class="user-name" id="navUserName">...</span>
              <span class="user-id" id="navUserId">...</span>
            </div>
            <div class="user-icon"><i class="fas fa-user"></i></div>
          </div>
          <a href="dashboard.html">الرئيسية</a>
          <a href="dashboard.html">الملاعب</a>
          <a href="my-bookings.html">حجوزاتي</a>
          <a href="#" class="nav-logout" id="logoutBtn">تسجيل الخروج</a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <div class="booking-layout">
        <div class="booking-calendar-section">
          <h2 class="text-brand mb-6"><i class="fas fa-calendar-alt"></i> اختر تاريخ ووقت الحجز</h2>
          
          <div class="calendar">
            <div class="calendar-header">
              <h3 id="calendarMonth"></h3>
              <div class="calendar-nav">
                <button id="prevMonth"><i class="fas fa-chevron-right"></i></button>
                <button id="nextMonth"><i class="fas fa-chevron-left"></i></button>
              </div>
            </div>
            <div class="calendar-grid" id="calendarGrid">
              <div class="calendar-day-header">أحد</div>
              <div class="calendar-day-header">إثن</div>
              <div class="calendar-day-header">ثلث</div>
              <div class="calendar-day-header">أربع</div>
              <div class="calendar-day-header">خمس</div>
              <div class="calendar-day-header">جمعة</div>
              <div class="calendar-day-header">سبت</div>
            </div>
          </div>

          <div class="timeslots-section hidden" id="timeSlotsSection">
            <div class="divider"></div>
            <h3><i class="fas fa-clock"></i> <span id="selectedDateDisplay"></span></h3>
            <div class="timeslots-grid" id="timeSlotsGrid"></div>
            
            <div style="display: flex; gap: var(--space-4); justify-content: center; flex-wrap: wrap; margin-top: var(--space-6); font-size: 0.85rem; font-weight: 600;">
              <div style="display: flex; align-items: center; gap: var(--space-2);">
                <div style="width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--color-status-verified); background: transparent;"></div>
                <span style="color: var(--color-status-verified);">وقت متاح</span>
              </div>
              <div style="display: flex; align-items: center; gap: var(--space-2);">
                <div style="width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--color-action-danger); background: rgba(220,53,69,0.1);"></div>
                <span style="color: var(--color-action-danger);">محجوز مسبقاً</span>
              </div>
              <div style="display: flex; align-items: center; gap: var(--space-2);">
                <div style="width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid #60a5fa; background: #93c5fd;"></div>
                <span style="color: #4f91fcda;">حجزك الخاص</span>
              </div>
            </div>
          </div>
        </div>

        <div class="booking-sidebar">
          <div class="booking-field-info">
            <img id="fieldImage" src="assets/fields/padel.jpg" alt="">
            <div>
              <div class="booking-field-name" id="fieldName">—</div>
              <div class="booking-field-sport" id="fieldSport">—</div>
            </div>
          </div>

          <div class="quota-indicator mb-4">
            <div style="width: 100%;">
              <div class="flex-between mb-1">
                <span>الحصة اليومية</span>
                <span id="quotaText">...</span>
              </div>
              <div class="quota-bar"><div class="quota-bar-fill" id="quotaFill"></div></div>
            </div>
          </div>

          <div class="hidden" id="playerSection">
            <div class="divider"></div>
            <h3>اللاعبون <span id="playerCountBadge" class="badge badge-info"></span></h3>
            <div id="playerFields" class="mt-4"></div>
            
            <div class="mt-4 p-3 bg-light rounded shadow-sm">
              <label class="flex-between m-0 cursor-pointer">
                <span>فتح الحجز للعامة</span>
                <input type="checkbox" id="publicToggle">
              </label>
            </div>

            <div id="bookingSummary" class="booking-summary mt-4" style="display:none;">
              <h4 class="text-brand"><i class="fas fa-receipt"></i> ملخص</h4>
              <div class="booking-summary-row"><span>الملعب</span><span id="summaryField"></span></div>
              <div class="booking-summary-row"><span>الوقت</span><span id="summaryTime"></span></div>
              <div class="booking-summary-row"><span>الحالة</span><span id="summaryStatus"></span></div>
            </div>

            <button class="btn btn-primary btn-block mt-4" id="confirmBookingBtn" disabled>تأكيد الحجز</button>
          </div>
          
          <div id="initialPrompt" class="text-center p-8">
            <div style="font-size: 3rem; opacity: 0.3;">📅</div>
            <p class="text-muted mt-2">يرجى اختيار موعد</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
  <div class="toast-container" id="toastContainer"></div>
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <div class="modal-body" id="confirmModalBody"></div>
      <div class="modal-footer"><button class="btn btn-secondary" id="confirmModalCancel">إلغاء</button><button class="btn btn-primary" id="confirmModalOk">تأكيد</button></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/booking.js"></script>
  <script>
    let currentField = null, selectedDate = null, selectedSlots = [], currentUser = null;
    let currentMonth = new Date().getMonth(), currentYear = new Date().getFullYear();

    const IMAGES = { padel:'assets/fields/padel.jpg', football:'assets/fields/football5.jpg', squash:'assets/fields/squash.jpg', multi:'assets/fields/multi.jpg', beach:'assets/fields/beach.jpg' };

    document.addEventListener('DOMContentLoaded', () => {
      AuthManager.onAuthStateChanged(user => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        const badge = document.getElementById('headerUserBadge');
        if (badge) {
          badge.style.display = 'flex';
          document.getElementById('navUserName').textContent = user.name;
          document.getElementById('navUserId').textContent = user.uid;
        }
        init();
      });
    });

    async function init() {
      const fieldId = (Utils.getParam('field') || '').toLowerCase();
      if (!fieldId || !BookingEngine.FIELDS[fieldId]) { window.location.href = 'dashboard.html'; return; }
      
      currentField = { id: fieldId, ...BookingEngine.FIELDS[fieldId] };
      document.getElementById('fieldName').textContent = currentField.name;
      document.getElementById('fieldSport').textContent = BookingEngine.getSportName(currentField.sport);
      document.getElementById('fieldImage').src = IMAGES[currentField.sport] || IMAGES.padel;
      
      updateQuota();
      renderCalendar();
      setupHandlers();
    }

    async function updateQuota(date) {
      const limit = AuthManager.getDailyLimit(currentUser.role);
      let used = await BookingEngine.getUsedHoursOnDate(currentUser.uid, date || Utils.today());
      const text = document.getElementById('quotaText'), fill = document.getElementById('quotaFill');
      if (limit === Infinity) { text.textContent = 'غير محدود'; fill.style.width = '0%'; return; }
      text.textContent = `${used}/${limit} ساعة`;
      fill.style.width = Math.min(100, (used/limit)*100) + '%';
    }

    function renderCalendar() {
      const grid = document.getElementById('calendarGrid');
      const headers = Array.from(grid.querySelectorAll('.calendar-day-header'));
      grid.innerHTML = ''; headers.forEach(h => grid.appendChild(h));
      
      const monNames = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
      document.getElementById('calendarMonth').textContent = `${monNames[currentMonth]} ${currentYear}`;
      
      const first = new Date(currentYear, currentMonth, 1).getDay(), days = new Date(currentYear, currentMonth + 1, 0).getDate();
      for (let i=0; i<first; i++) { const e = document.createElement('div'); e.className = 'calendar-day empty'; grid.appendChild(e); }
      const today = new Date(); today.setHours(0,0,0,0);
      
      for (let d=1; d<=days; d++) {
        const ds = `${currentYear}-${(currentMonth+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
        const c = document.createElement('div'); c.className = 'calendar-day'; c.textContent = d;
        if (new Date(currentYear, currentMonth, d) < today) c.classList.add('disabled');
        else c.onclick = () => selectDate(ds, c);
        if (selectedDate === ds) c.classList.add('selected');
        grid.appendChild(c);
      }
    }

    async function selectDate(ds, c) {
      selectedDate = ds; selectedSlots = [];
      document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected'));
      c.classList.add('selected');
      document.getElementById('selectedDateDisplay').textContent = Utils.formatDate(ds);
      document.getElementById('timeSlotsSection').classList.remove('hidden');
      updateQuota(ds);
      renderTimeSlots(ds);
    }

    async function renderTimeSlots(date) {
      const g = document.getElementById('timeSlotsGrid');
      g.innerHTML = '<div class="spinner spinner-sm"></div>';
      const slots = Utils.generateTimeSlots(currentField.open, currentField.close);
      const ex = await BookingEngine.getFieldBookings(currentField.id, date);
      
      const allMyBookings = await BookingEngine.getUserBookings(currentUser.uid);
      const myBookingsToday = allMyBookings.filter(b => b.date === date);

      g.innerHTML = '';
      slots.forEach(s => {
        const fieldBooked = ex.some(b => BookingEngine._timesOverlap(s.startTime, s.endTime, b.startTime, b.endTime));
        const bookedByMe = myBookingsToday.some(b => BookingEngine._timesOverlap(s.startTime, s.endTime, b.startTime, b.endTime));
        
        const isBooked = fieldBooked || bookedByMe;
        
        const div = document.createElement('div'); 
        div.className = 'timeslot ' + (isBooked ? 'booked' : 'available');
        div.textContent = s.display;
        
        if (bookedByMe) {
          div.style.backgroundColor = '#93c5fd';
          div.style.color = '#1e3a8a';
          div.style.borderColor = '#60a5fa';
          div.title = 'لديك حجز في هذا الوقت';
        }

        if (!isBooked) div.onclick = () => {
          selectedSlots = [s];
          document.querySelectorAll('.timeslot').forEach(t => t.classList.remove('selected'));
          div.classList.add('selected');
          updateSidebar();
        };
        g.appendChild(div);
      });
    }

    function updateSidebar() {
      const ok = selectedSlots.length > 0;
      document.getElementById('playerSection').classList.toggle('hidden', !ok);
      document.getElementById('initialPrompt').classList.toggle('hidden', ok);
      if (ok) {
        document.getElementById('bookingSummary').style.display = 'block';
        document.getElementById('summaryField').textContent = currentField.name;
        document.getElementById('summaryTime').textContent = selectedSlots[0].display;
        renderPlayers();
      }
    }

    const debounceTimers = {};

    function renderPlayers() {
      const c = document.getElementById('playerFields'); c.innerHTML = '';
      document.getElementById('playerCountBadge').textContent = `${currentField.players} لاعبين`;
      for (let i=0; i<currentField.players; i++) {
        const wrapper = document.createElement('div');
        wrapper.className = 'player-input-wrapper mb-2';
        wrapper.style.position = 'relative';

        const inp = document.createElement('input'); 
        inp.className = 'form-input player-id-input w-100';
        inp.placeholder = `الرقم الجامعي للاعب ${i+1}`;
        inp.dataset.index = i;
        
        const icon = document.createElement('i');
        icon.className = 'fas hidden';
        icon.style.position = 'absolute';
        icon.style.left = '12px';
        icon.style.top = '50%';
        icon.style.transform = 'translateY(-50%)';
        
        if (i===0) { 
          inp.value = currentUser.uid; 
          inp.readOnly = true; 
          icon.className = 'fas fa-check';
          icon.style.color = 'var(--color-status-verified)';
        }
        
        inp.oninput = () => {
          checkValid();
          validatePlayerRealtime(inp, icon);
        };
        
        wrapper.appendChild(inp);
        wrapper.appendChild(icon);
        c.appendChild(wrapper);
      }
      checkValid();
    }

    async function validatePlayerRealtime(inp, icon) {
      if (inp.readOnly) return;
      const id = inp.value.trim().toLowerCase();
      const pId = inp.dataset.index;
      
      if (!id) {
        icon.className = 'fas hidden';
        return;
      }
      
      icon.className = 'fas fa-spinner fa-spin';
      icon.style.color = 'var(--color-text-muted)';
      
      clearTimeout(debounceTimers[pId]);
      debounceTimers[pId] = setTimeout(async () => {
        const u = await AuthManager.getUserById(id);
        if (u) {
          icon.className = 'fas fa-check';
          icon.style.color = 'var(--color-status-verified)';
        } else {
          icon.className = 'fas fa-times';
          icon.style.color = 'var(--color-action-danger)';
        }
      }, 400);
    }

    function checkValid() {
      const inps = document.querySelectorAll('.player-id-input');
      const isPublic = document.getElementById('publicToggle').checked;
      let valid = true, fill = 0;
      inps.forEach(i => { if (i.value.trim()) fill++; else if (!isPublic) valid = false; });
      document.getElementById('confirmBookingBtn').disabled = !valid || fill < 1;
    }

    function setupHandlers() {
      document.getElementById('prevMonth').onclick = () => { currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} renderCalendar(); };
      document.getElementById('nextMonth').onclick = () => { currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} renderCalendar(); };
      document.getElementById('logoutBtn').onclick = () => { AuthManager.logout(); window.location.href='index.html'; };
      document.getElementById('publicToggle').onchange = checkValid;
      document.getElementById('confirmBookingBtn').onclick = () => {
        document.getElementById('confirmModalBody').innerHTML = `<p>تأكيد حجز <b>${currentField.name}</b> يوم <b>${Utils.formatDate(selectedDate)}</b> الساعة <b>${selectedSlots[0].display}</b>؟</p>`;
        document.getElementById('confirmModal').classList.add('active');
      };
      document.getElementById('confirmModalCancel').onclick = () => document.getElementById('confirmModal').classList.remove('active');
      document.getElementById('confirmModalOk').onclick = doBooking;
    }

    async function doBooking() {
      Utils.showLoading('جاري الحجز...');
      try {
        const p = Array.from(document.querySelectorAll('.player-id-input')).map(i => i.value.trim().toLowerCase()).filter(v => v);
        const players = await Promise.all(p.map(async id => {
          const u = await AuthManager.getUserById(id);
          if (!u) {
            throw new Error(`لم يتم العثور على حساب بالرقم الجامعي: ${id}`);
          }
          return { id, name: u.name, email: u.email };
        }));
        const b = await BookingEngine.createBooking({
          fieldId: currentField.id, date: selectedDate, startTime: selectedSlots[0].startTime, endTime: selectedSlots[0].endTime, duration: 1, bookedBy: currentUser.uid, isPublic: document.getElementById('publicToggle').checked, players
        });
        window.location.href = `confirmation.html?id=${b.bookingId}`;
      } catch(ex) { Utils.hideLoading(); alert(ex.message); }
    }
  </script>
</body>
</html>
